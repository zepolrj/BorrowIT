<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - BorrowIT</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="register">
  <header class="site-header">
    <div class="brand">BorrowIT</div>
    <nav>
      <a href="/login.html">Login</a>
      <a href="/">Home</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="form-card">
      <h1>Create Account</h1>
      <div id="register-feedback" class="status-message"></div>
      <form id="register-form">
        <label>First Name<input name="firstName" required></label>
        <label>Middle Name<input name="middleName"></label>
        <label>Last Name<input name="lastName" required></label>
        <label>Suffix<input name="suffix"></label>
        <label>Student ID<input name="studentId" inputmode="numeric" pattern="[0-9]*" required></label>
        <label>Phone Number<input name="phoneNumber" inputmode="numeric" pattern="[0-9]{11}" required></label>
        <label>Branch<input name="branch" required></label>
        <label>Course<input name="course" required></label>
        <label>Year Level<select name="yearLevel" required>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select></label>
        <label>Block<select name="block" required>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
          <option value="E">E</option>
          <option value="F">F</option>
        </select></label>
        <label>Password<input name="password" type="password" required></label>
        <button type="submit">Register</button>
      </form>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
